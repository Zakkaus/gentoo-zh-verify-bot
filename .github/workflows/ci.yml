name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: gosec
        # Triaged-accepted under the private systemd StateDirectory= deployment: G304/G703
        # (operator-controlled config / STATE_DIRECTORY paths) and G706 (log taint on operator /
        # Telegram-supplied values, consumed by journald). The gate fails on any OTHER finding.
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -exclude=G304,G703,G706 ./...
